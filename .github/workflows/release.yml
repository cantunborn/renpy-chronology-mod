name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true
      title:
        description: "Release title"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          VERSION="${{ github.event.inputs.version }}"
          MOD_DIR="staging/game/renpy-chronology-mod"
          mkdir -p "$MOD_DIR"

          cp timeline_init.rpy \
             timeline_hooks.rpy \
             timeline_screen.rpy \
             timeline_save_hooks.rpy \
             timeline_tests.rpy \
             "$MOD_DIR/"
          cp -r fonts "$MOD_DIR/fonts"

          python3 - README.md "$MOD_DIR/README.txt" <<'PYEOF'
          import sys, re
          src, dst = sys.argv[1], sys.argv[2]
          text = open(src, encoding="utf-8").read()
          text = re.sub(r'<details>.*?</details>', '', text, flags=re.DOTALL).strip()
          lines = text.splitlines()
          out = []
          for line in lines:
              if re.match(r'^# ', line):
                  t = line[2:].strip(); out += [t.upper(), "=" * len(t)]
              elif re.match(r'^## ', line):
                  t = line[3:].strip(); out += ["", t.upper(), "-" * len(t)]
              elif re.match(r'^### ', line):
                  out += ["", line[4:].strip()]
              elif re.match(r'^---+$', line.strip()):
                  pass
              elif re.match(r'^\|[-| :]+\|$', line.strip()):
                  pass
              elif line.strip().startswith("|") and line.strip().endswith("|"):
                  cells = [c.strip() for c in line.strip().strip("|").split("|")]
                  out.append("  ".join(f"{c:<20}" for c in cells).rstrip())
              else:
                  line = re.sub(r'\*\*(.+?)\*\*', r'\1', line)
                  line = re.sub(r'\*(.+?)\*',     r'\1', line)
                  line = re.sub(r'`(.+?)`',        r'\1', line)
                  line = re.sub(r'\[(.+?)\]\(.+?\)', r'\1', line)
                  out.append(line)
          open(dst, "w", encoding="utf-8").write("\n".join(out).strip() + "\n")
          PYEOF

          cd staging
          zip -r "../chronology-mod-${VERSION}.zip" game/ -x "*.DS_Store"
          echo "ZIP=chronology-mod-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TITLE="${{ github.event.inputs.title }}"
          TITLE="${TITLE:-Chronology Mod $VERSION}"

          gh release create "$VERSION" "$ZIP" \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --generate-notes \
            --clobber
