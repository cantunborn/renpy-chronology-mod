name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for the zip filename (e.g. v1.2)"
        required: true
      game:
        description: "Game name (e.g. imperial-chronicles) — leave blank for base mod release"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run unit tests
        run: python3 tests/test_unit.py

      - name: Build zip
        run: |
          VERSION="${{ github.event.inputs.version }}"
          MOD_DIR="staging/game/renpy-chronology-mod"
          mkdir -p "$MOD_DIR"

          cp timeline_init.rpy \
             timeline_hooks.rpy \
             timeline_screen.rpy \
             timeline_save_hooks.rpy \
             timeline_tests.rpy \
             "$MOD_DIR/"
          cp -r fonts "$MOD_DIR/fonts"

          GAME="${{ github.event.inputs.game }}"
          GAME_FILE="${GAME:-sample}"
          if [ ! -f "game-chapters/${GAME_FILE}.json" ]; then
            echo "ERROR: game-chapters/${GAME_FILE}.json not found"; exit 1
          fi
          cp "game-chapters/${GAME_FILE}.json" "$MOD_DIR/chapters.json"

          python3 - README.md "$MOD_DIR/README.txt" <<'PYEOF'
          import sys, re
          src, dst = sys.argv[1], sys.argv[2]
          text = open(src, encoding="utf-8").read()
          text = re.sub(r'<details>.*?</details>', '', text, flags=re.DOTALL).strip()
          lines = text.splitlines()
          out = []
          for line in lines:
              if re.match(r'^# ', line):
                  t = line[2:].strip(); out += [t.upper(), "=" * len(t)]
              elif re.match(r'^## ', line):
                  t = line[3:].strip(); out += ["", t.upper(), "-" * len(t)]
              elif re.match(r'^### ', line):
                  out += ["", line[4:].strip()]
              elif re.match(r'^---+$', line.strip()):
                  pass
              elif re.match(r'^```', line.strip()):
                  pass
              elif re.match(r'^\|[-| :]+\|$', line.strip()):
                  pass
              elif line.strip().startswith("|") and line.strip().endswith("|"):
                  cells = [c.strip() for c in line.strip().strip("|").split("|")]
                  out.append("  ".join(f"{c:<20}" for c in cells).rstrip())
              else:
                  line = re.sub(r'\*\*(.+?)\*\*', r'\1', line)
                  line = re.sub(r'\*(.+?)\*',     r'\1', line)
                  line = re.sub(r'`(.+?)`',        r'\1', line)
                  line = re.sub(r'\[(.+?)\]\(.+?\)', r'\1', line)
                  out.append(line)
          open(dst, "w", encoding="utf-8").write("\n".join(out).strip() + "\n")
          PYEOF

          GAME="${{ github.event.inputs.game }}"
          ZIP_NAME="chronology-mod-${VERSION}${GAME:+-$GAME}.zip"
          cd staging
          zip -r "../${ZIP_NAME}" game/ -x "*.DS_Store"
          echo "ZIP=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GAME="${{ github.event.inputs.game }}"

          # Fixed tag and title — one permanent release per target, updated in place
          if [ -n "$GAME" ]; then
            TAG="stable-${GAME}"
            TITLE="Chronology Mod - $(echo "$GAME" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')"
          else
            TAG="stable"
            TITLE="Chronology Mod - Stable Release"
          fi

          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create "$TAG" "$ZIP" \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --generate-notes
